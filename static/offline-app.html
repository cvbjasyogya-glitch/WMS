<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#07111f">
    <title>ERP-CV.BJAS Offline</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Plus Jakarta Sans", system-ui, sans-serif;
            background:
                radial-gradient(circle at top, rgba(93, 183, 255, 0.18), transparent 38%),
                linear-gradient(180deg, #07111f 0%, #0b172a 100%);
            color: #f7fbff;
        }

        .offline-shell {
            width: min(100%, 440px);
            padding: 28px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(9, 18, 33, 0.92);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
            text-align: center;
        }

        .offline-shell img {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            object-fit: cover;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.96);
            padding: 12px;
        }

        .offline-shell h1 {
            margin: 0 0 12px;
            font-size: clamp(1.6rem, 4vw, 2rem);
        }

        .offline-shell p {
            margin: 0;
            color: rgba(235, 243, 255, 0.82);
            line-height: 1.65;
        }

        .offline-actions {
            display: grid;
            gap: 12px;
            margin-top: 22px;
        }

        .offline-actions a,
        .offline-actions button {
            border: 0;
            border-radius: 18px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .offline-actions a {
            text-decoration: none;
            color: #07111f;
            background: linear-gradient(135deg, #5db7ff, #3478ff);
        }

        .offline-actions button {
            color: #f7fbff;
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>
    <main class="offline-shell">
        <img src="/static/brand/mataram-logo.png" alt="ERP-CV.BJAS">
        <h1>Koneksi sedang terputus</h1>
        <p>ERP-CV.BJAS masih bisa dibuka sebagai aplikasi, tetapi halaman ini membutuhkan internet untuk memuat data terbaru. Sambungkan lagi jaringan lalu muat ulang.</p>
        <div class="offline-actions">
            <a href="/">Buka Portal</a>
            <button type="button" onclick="window.location.reload()">Coba Lagi</button>
        </div>
    </main>
</body>
</html>
