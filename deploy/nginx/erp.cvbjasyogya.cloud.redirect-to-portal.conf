server {
    listen 80;
    listen [::]:80;
    server_name erp.cvbjasyogya.cloud;

    root /var/www/erp.cvbjasyogya.cloud;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://portal.cvbjas.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.cvbjasyogya.cloud;

    ssl_certificate /etc/letsencrypt/live/erp.cvbjasyogya.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.cvbjasyogya.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        return 301 https://portal.cvbjas.com$request_uri;
    }
}
