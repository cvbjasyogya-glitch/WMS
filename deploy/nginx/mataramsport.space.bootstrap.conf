server {
    listen 80;
    listen [::]:80;
    server_name mataramsport.space;

    root /var/www/mataramsport.space;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        default_type text/plain;
        return 200 "mataramsport.space SMS bootstrap aktif\n";
    }
}
