server {
    listen 80;
    listen [::]:80;
    server_name mataram.cvbjas.com;

    root /root/WMS/deploy/static/mataram.cvbjas.com;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

