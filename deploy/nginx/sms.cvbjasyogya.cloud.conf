server {
    listen 80;
    listen [::]:80;
    server_name sms.cvbjasyogya.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sms.cvbjasyogya.cloud;

    client_max_body_size 100g;

    ssl_certificate /etc/letsencrypt/live/sms.cvbjasyogya.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sms.cvbjasyogya.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://wms_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
