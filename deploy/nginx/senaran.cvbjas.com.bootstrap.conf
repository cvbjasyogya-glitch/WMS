server {
    listen 80;
    listen [::]:80;
    server_name senaran.cvbjas.com;

    root /var/www/senaran.cvbjas.com;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        default_type text/plain;
        return 200 "senaran.cvbjas.com bootstrap OK\n";
    }
}
