server {
    listen 80;
    listen [::]:80;
    server_name portal.cvbjas.com;

    root /var/www/portal.cvbjas.com;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        default_type text/plain;
        return 200 "portal.cvbjas.com bootstrap aktif\n";
    }
}
