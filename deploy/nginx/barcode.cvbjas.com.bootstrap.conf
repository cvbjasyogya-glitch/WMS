server {
    listen 80;
    listen [::]:80;
    server_name barcode.cvbjas.com;

    root /var/www/barcode.cvbjas.com;
    index index.html;

    error_page 401 = @barcode_login;

    location = /__barcode_auth {
        internal;
        proxy_pass http://wms_app/stock/barcode/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host portal.cvbjas.com;
        proxy_set_header X-Forwarded-Host portal.cvbjas.com;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location @barcode_login {
        return 302 https://portal.cvbjas.com/login?next=/stock/barcode/sso%3Ftarget%3Dhttps%253A%252F%252Fbarcode.cvbjas.com%252F;
    }

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        auth_request /__barcode_auth;
        try_files $uri $uri/ /index.html;
    }
}
