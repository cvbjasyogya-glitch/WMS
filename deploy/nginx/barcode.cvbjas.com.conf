server {
    listen 80;
    listen [::]:80;
    server_name barcode.cvbjas.com;

    root /var/www/barcode.cvbjas.com;
    error_page 401 = @barcode_login;

    location = /__barcode_auth {
        internal;
        proxy_pass http://wms_app/stock/barcode/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host portal.cvbjas.com;
        proxy_set_header X-Forwarded-Host portal.cvbjas.com;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location @barcode_login {
        return 302 https://portal.cvbjas.com/login;
    }

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        auth_request /__barcode_auth;
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name barcode.cvbjas.com;

    root /var/www/barcode.cvbjas.com;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/barcode.cvbjas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barcode.cvbjas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 401 = @barcode_login;

    location = /__barcode_auth {
        internal;
        proxy_pass http://wms_app/stock/barcode/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host portal.cvbjas.com;
        proxy_set_header X-Forwarded-Host portal.cvbjas.com;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location @barcode_login {
        return 302 https://portal.cvbjas.com/login;
    }

    location / {
        auth_request /__barcode_auth;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        auth_request /__barcode_auth;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
