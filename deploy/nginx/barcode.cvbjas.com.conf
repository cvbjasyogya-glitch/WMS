server {
    listen 80;
    listen [::]:80;
    server_name barcode.cvbjas.com;

    root /var/www/barcode.cvbjas.com;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name barcode.cvbjas.com;

    root /var/www/barcode.cvbjas.com;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/barcode.cvbjas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barcode.cvbjas.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
