<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Sistem Antrian Stringing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo-mega.png') }}">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-page">
    <main class="login-wrap">
        <section class="login-panel">
            <div class="login-brand">
                <div class="login-logo-wrap">
                    <img class="login-logo" src="{{ url_for('static', filename='assets/logo-mega.png') }}" alt="Mega Sports">
                </div>
                <div>
                    <h1>Sistem Antrian Senaran</h1>
                    <p>Mega Sports</p>
                </div>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} mb-3" role="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" class="login-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label class="form-label" for="username">Username</label>
                <div class="input-icon mb-3">
                    <i class="bi bi-person"></i>
                    <input class="form-control" id="username" name="username" type="text" autocomplete="username" required autofocus>
                </div>

                <label class="form-label" for="password">Password</label>
                <div class="input-icon mb-4">
                    <i class="bi bi-lock"></i>
                    <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                </div>

                <button class="btn btn-primary w-100" type="submit">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Login
                </button>
                <a class="btn btn-outline-primary w-100 mt-3 login-display-link" href="{{ url_for('layar_monitor') }}" target="_blank" rel="noopener">
                    <i class="bi bi-tv"></i>
                    Buka Customer Display
                </a>
            </form>
            <div class="login-footer-note">
                <div class="login-footer-logo">
                    <img src="{{ url_for('static', filename='assets/logo-mega.png') }}" alt="Mega Sports">
                </div>
                <span>Powered by Mega Sports Stringing Queue</span>
            </div>
        </section>
    </main>
</body>
</html>
